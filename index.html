<!DOCTYPE html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>mianfengchen.github.io</title>
    <style>
      :root {
        color-scheme: light;
        --bg: #f4efe5;
        --panel: rgba(255, 252, 247, 0.88);
        --ink: #1f2a1f;
        --muted: #596356;
        --accent: #315c3a;
        --accent-soft: #dce8d8;
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        min-height: 100vh;
        display: grid;
        place-items: center;
        padding: 24px;
        background:
          radial-gradient(circle at top, rgba(113, 157, 112, 0.28), transparent 36%),
          linear-gradient(160deg, #f6f2e8 0%, #edf3ea 100%);
        color: var(--ink);
        font-family: "Segoe UI", "PingFang SC", "Microsoft YaHei", sans-serif;
      }

      main {
        width: min(760px, 100%);
        padding: 32px;
        border-radius: 24px;
        background: var(--panel);
        box-shadow: 0 18px 48px rgba(31, 42, 31, 0.14);
        backdrop-filter: blur(10px);
      }

      h1 {
        margin: 0 0 12px;
        font-size: clamp(2rem, 5vw, 3.2rem);
      }

      p {
        margin: 0 0 20px;
        color: var(--muted);
        line-height: 1.6;
      }

      .links {
        display: grid;
        gap: 14px;
      }

      a {
        display: block;
        padding: 18px 20px;
        border-radius: 16px;
        text-decoration: none;
        color: var(--ink);
        background: var(--accent-soft);
        border: 1px solid rgba(49, 92, 58, 0.12);
        transition: transform 0.18s ease, box-shadow 0.18s ease;
      }

      a:hover {
        transform: translateY(-2px);
        box-shadow: 0 10px 24px rgba(49, 92, 58, 0.14);
      }

      strong {
        display: block;
        margin-bottom: 4px;
        color: var(--accent);
      }
    </style>
  </head>
  <body>
    <main>
      <h1>站点入口</h1>
      <p>GitHub Pages 根目录现在提供统一入口，下面是当前可访问的页面。</p>
      <div class="links">
        <a href="./survival/">
          <strong>花园幸存者</strong>
          进入 submodule 发布的游戏页面
        </a>
        <a href="./welcome.html">
          <strong>welcome.html</strong>
          原有欢迎页
        </a>
        <a href="./xy-card.html">
          <strong>xy-card.html</strong>
          原有活动页
        </a>
      </div>
    </main>
  </body>
</html>
